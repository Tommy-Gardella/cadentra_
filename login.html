<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Cadentra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-page {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(79,195,247,0.07) 0%, transparent 65%);
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 32px;
      justify-content: center;
    }

    .auth-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .auth-tab.active {
      background: var(--accent);
      color: #000;
    }

    .auth-form-group {
      margin-bottom: 18px;
    }

    .auth-form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .auth-form-group input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color var(--transition);
    }

    .auth-form-group input:focus {
      border-color: var(--accent);
    }

    .auth-form-group input::placeholder {
      color: var(--muted-2);
    }

    .auth-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      color: #f87171;
      font-size: 0.85rem;
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .auth-success {
      background: rgba(79, 195, 247, 0.08);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-size: 0.85rem;
      padding: 12px 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .auth-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition);
      margin-top: 4px;
    }

    .auth-submit:hover { opacity: 0.88; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      cursor: pointer;
    }

    .auth-footer a:hover { opacity: 0.8; }

    .auth-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted-2);
      margin: 6px 0 16px;
    }
  </style>
</head>
<body>

    <div class="nav-container">

        <svg class="nav-logo-icon" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="29" cy="5" r="4.5" fill="#4FC3F7"/>

          <path d="M24 16 L14 21" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 24 L9 34" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
          <path d="M9 34 L5 40" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 24 L25 35" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>

        </svg>

      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>

      </ul>

      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
    </div>
    <div class="nav-mobile-menu">
      <a href="index.html">Home</a>

  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <svg viewBox="0 0 40 44" fill="none" width="28" height="32" aria-hidden="true">
          <circle cx="29" cy="5" r="4.5" fill="#4FC3F7"/>
          <path d="M26 9.5 L18 24" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M24 16 L32 11" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M24 16 L14 21" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 24 L9 34" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
          <path d="M9 34 L5 40" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 24 L25 35" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
          <path d="M25 35 L30 40" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        CADENTRA
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin">Sign In</button>
        <button class="auth-tab" id="tab-signup">Create Account</button>
      </div>

      <div id="auth-error"   class="auth-error"   style="display:none;"></div>
      <div id="auth-success" class="auth-success" style="display:none;"></div>

      <form id="auth-form" autocomplete="on">
        <div class="auth-form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="auth-form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-submit" id="auth-submit">Sign In</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a id="toggle-mode">Create one</a>
      </p>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="script.js"></script>
  <script>
  (function () {
    if (!window._supabase) {
      document.getElementById('auth-error').textContent = 'Auth is not configured yet. Fill in js/supabase-client.js with your Supabase credentials.';
      document.getElementById('auth-error').style.display = 'block';
      return;
    }

    var mode = 'signin';
    var form       = document.getElementById('auth-form');
    var emailInput = document.getElementById('auth-email');
    var passInput  = document.getElementById('auth-password');
    var submitBtn  = document.getElementById('auth-submit');
    var errDiv     = document.getElementById('auth-error');
    var okDiv      = document.getElementById('auth-success');
    var tabIn      = document.getElementById('tab-signin');
    var tabUp      = document.getElementById('tab-signup');

    // Redirect if already logged in
    window._supabase.auth.getUser().then(function (r) {
      if (r.data && r.data.user) window.location.href = 'dashboard.html';
    });

    function setMode(m) {
      mode = m;
      errDiv.style.display = 'none';
      okDiv.style.display  = 'none';
      if (m === 'signin') {
        tabIn.classList.add('active');
        tabUp.classList.remove('active');
        submitBtn.textContent = 'Sign In';
        document.querySelector('.auth-footer').innerHTML = "Don't have an account? <a id='toggle-mode'>Create one</a>";
        passInput.setAttribute('autocomplete', 'current-password');
      } else {
        tabUp.classList.add('active');
        tabIn.classList.remove('active');
        submitBtn.textContent = 'Create Account';
        document.querySelector('.auth-footer').innerHTML = 'Already have an account? <a id="toggle-mode">Sign in</a>';
        passInput.setAttribute('autocomplete', 'new-password');
      }
      document.getElementById('toggle-mode').addEventListener('click', function () {
        setMode(mode === 'signin' ? 'signup' : 'signin');
      });
    }

    tabIn.addEventListener('click', function () { setMode('signin'); });
    tabUp.addEventListener('click', function () { setMode('signup'); });
    document.getElementById('toggle-mode').addEventListener('click', function () {
      setMode(mode === 'signin' ? 'signup' : 'signin');
    });

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errDiv.style.display = 'none';
      okDiv.style.display  = 'none';
      submitBtn.disabled   = true;
      submitBtn.textContent = 'Please wait...';

      var email    = emailInput.value.trim();
      var password = passInput.value;
      var result;

      if (mode === 'signin') {
        result = await window._supabase.auth.signInWithPassword({ email: email, password: password });
      } else {
        result = await window._supabase.auth.signUp({ email: email, password: password });
      }

      if (result.error) {
        errDiv.textContent    = result.error.message;
        errDiv.style.display  = 'block';
        submitBtn.disabled    = false;
        submitBtn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      } else if (mode === 'signup' && !result.data.session) {
        // Email confirmation required
        okDiv.textContent   = 'Check your inbox to confirm your email, then sign in.';
        okDiv.style.display = 'block';
        submitBtn.disabled  = false;
        submitBtn.textContent = 'Create Account';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  })();
  </script>
</body>
</html>
